<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>565 N Boulder Ridge — listing photos</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #EEF3F6; color: #1E2D3C; margin: 0; padding: 20px; }
  h1 { font-family: 'Fraunces', Georgia, serif; font-weight: 300; font-size: 28px; margin: 0 0 6px; letter-spacing: -0.02em; }
  p { color: #455868; font-size: 13.5px; margin: 0 0 18px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .tile {
    background: #FAFCFD; border: 1px solid #C9D6DE; border-radius: 10px;
    overflow: hidden; cursor: grab; transition: transform 0.15s, box-shadow 0.15s;
    aspect-ratio: 4/3;
  }
  .tile:hover { transform: translateY(-2px); box-shadow: 0 8px 24px -8px rgba(30,45,60,0.18); }
  .tile:active { cursor: grabbing; }
  .tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
</style>
</head>
<body>
<h1>565 N Boulder Ridge — listing photos</h1>
<p>Drag any tile onto a room's "Current home photos" section.</p>
<div class="grid" id="grid"></div>
<script>
const N = 72;
const grid = document.getElementById('grid');
for (let i = 1; i <= N; i++) {
  const name = 'LIS_' + String(i).padStart(3, '0');
  const url = name + '.jpeg';
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.draggable = true;
  tile.innerHTML = `<img src="${url}" alt="${name}" draggable="false">`;
  tile.addEventListener('dragstart', e => {
    const abs = new URL(url, window.location.href).href;
    e.dataTransfer.setData('text/uri-list', abs);
    e.dataTransfer.setData('text/plain', abs);
    e.dataTransfer.setData('text/html', `<a href="${window.location.href}"><img src="${abs}" alt="${name}"></a>`);
    e.dataTransfer.effectAllowed = 'copy';
  });
  grid.appendChild(tile);
}
</script>
</body>
</html>
